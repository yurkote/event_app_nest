server {
    listen 80;
    server_name localhost;

    # Шлях до папки з вашим проектом
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Спочатку шукаємо реальний файл за посиланням, 
        # потім папку, і якщо нічого не знайшли — віддаємо index.html
        try_files $uri $uri/ /index.html;
    }

    # Опціонально: кешування статичних файлів (картинки, стилі)
    location ~* \.(?:ico|css|js|gif|jpe?g|png)$ {
        expires max;
        add_header Cache-Control "public";
    }
}